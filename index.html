<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Demo | MT Multiservices LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gl:#E8D08A;--gd:rgba(201,168,76,.13);--dark:#080808;--d2:#101010;--d3:#181818;--w:#F0EDE6;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--w);font-family:'Montserrat',sans-serif;min-height:100vh;padding:60px 24px;}
.wrap{max-width:640px;margin:0 auto;}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:6px;}
h1 em{color:var(--gold);font-style:normal;}
.sub{font-size:14px;opacity:.6;margin-bottom:32px;font-weight:300;}
.card{background:var(--d3);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:20px;margin-bottom:16px;}
label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:6px;margin-bottom:8px;}
input{width:100%;padding:12px 14px;background:var(--d2);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:var(--w);font-family:'Montserrat',sans-serif;font-size:14px;outline:none;}
input:focus{border-color:var(--gold);}
.row{display:flex;gap:10px;margin-bottom:20px;}
.row input{flex:1;}
button{padding:12px 22px;background:var(--gold);color:#080808;border:none;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;white-space:nowrap;}
button:hover{background:var(--gl);}
button:disabled{opacity:.5;cursor:default;}
.hint{font-size:11px;opacity:.4;margin-top:8px;}
.error{color:#e57373;font-size:13px;margin-bottom:16px;}
.result{border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.result.top{border-color:var(--gold);background:var(--gd);}
.result .section{font-size:13px;font-weight:500;}
.result.top .section{color:var(--gold);}
.result .score{font-size:12px;opacity:.5;}
.loading{font-size:13px;opacity:.6;}
</style>
</head>
<body>
<div class="wrap">
  <h1>RAG Pipeline — <em>Public Demo</em></h1>
  <p class="sub">Retrieval powered by real neural embeddings, on a NIST CSF 2.0 document. Built by MT Multiservices LLC.</p>

  <div class="card">
    <label>🔑 Access Password</label>
    <input type="password" id="apiKey" placeholder="Ask Moussa for it">
  </div>

  <div class="row">
    <input type="text" id="query" value="What is GOVERN?" placeholder="Ask your question...">
    <button id="askBtn">✨ Test</button>
  </div>

  <div id="error" class="error" style="display:none;"></div>
  <div id="loading" class="loading" style="display:none;">Searching...</div>
  <div id="results"></div>
</div>

<script>
const WEBHOOK_URL = "https://moses1920.app.n8n.cloud/webhook/7a7963fe-ec97-4162-8d35-9d3ae21b5dfb";

const btn = document.getElementById('askBtn');
const errorEl = document.getElementById('error');
const loadingEl = document.getElementById('loading');
const resultsEl = document.getElementById('results');

btn.addEventListener('click', async () => {
  const apiKey = document.getElementById('apiKey').value.trim();
  const query = document.getElementById('query').value.trim();
  errorEl.style.display = 'none';
  resultsEl.innerHTML = '';

  if (!apiKey) { errorEl.textContent = "Enter the password first."; errorEl.style.display = 'block'; return; }
  if (!query) return;

  btn.disabled = true;
  loadingEl.style.display = 'block';

  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ password: apiKey, question: query })
    });
    if (!res.ok) throw new Error('Error ' + res.status + ' — check the password.');
    const data = await res.json();
    const ranked = Array.isArray(data) ? data : (data.data || []);

    ranked.forEach((r, i) => {
      const pct = Math.round((r.score || 0) * 100);
      const div = document.createElement('div');
      div.className = 'result' + (i === 0 ? ' top' : '');
      div.innerHTML = `<span class="section">${r.section}</span><span class="score">${pct}%</span>`;
      resultsEl.appendChild(div);
    });
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    loadingEl.style.display = 'none';
  }
});
</script>
</body>
</html>
